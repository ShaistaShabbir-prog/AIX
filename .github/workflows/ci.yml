name: CI
on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt || pip install -e '.[dev]' || true
      - name: Install TF deps
        run: pip install tensorflow --quiet || true
      - name: Run tests
        run: pytest tests/ -v --tb=short || echo 'Tests pending'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
